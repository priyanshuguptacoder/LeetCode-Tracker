<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 2px solid;
        }
        .success {
            background: #00C89620;
            border-color: #00C896;
        }
        .error {
            background: #ef444420;
            border-color: #ef4444;
        }
        button {
            background: #00C896;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #00a076;
        }
        pre {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🧪 API Connection Test</h1>
    
    <div id="config" class="status">
        <h2>Configuration</h2>
        <p id="configText">Loading...</p>
    </div>

    <div id="status" class="status">
        <h2>Connection Status</h2>
        <p id="statusText">Not tested yet</p>
    </div>

    <button onclick="testConnection()">Test Connection</button>
    <button onclick="testProblems()">Test Get Problems</button>
    <button onclick="location.reload()">Refresh</button>

    <div id="result"></div>

    <script src="api-config.js"></script>
    <script>
        // Show configuration
        document.getElementById('configText').innerHTML = `
            <strong>Environment:</strong> ${window.location.hostname === 'localhost' ? 'LOCAL' : 'PRODUCTION'}<br>
            <strong>Hostname:</strong> ${window.location.hostname}<br>
            <strong>API Base URL:</strong> ${window.API_BASE_URL}<br>
            <strong>Expected:</strong> http://localhost:5001/api
        `;

        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('statusText');
            
            statusText.textContent = 'Testing connection...';
            statusDiv.className = 'status';

            try {
                const response = await fetch('http://localhost:5001/');
                const data = await response.json();
                
                statusDiv.className = 'status success';
                statusText.innerHTML = `
                    ✅ <strong>Backend is running!</strong><br>
                    Message: ${data.message}<br>
                    Version: ${data.version}
                `;
            } catch (error) {
                statusDiv.className = 'status error';
                statusText.innerHTML = `
                    ❌ <strong>Connection failed!</strong><br>
                    Error: ${error.message}<br>
                    <br>
                    <strong>Troubleshooting:</strong><br>
                    1. Make sure backend is running: cd backend && npm start<br>
                    2. Check if port 5001 is in use<br>
                    3. Check browser console for CORS errors
                `;
            }
        }

        async function testProblems() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="status"><p>Fetching problems...</p></div>';

            try {
                const response = await window.API.getAllProblems();
                
                if (response.success) {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            <h2>✅ Success!</h2>
                            <p><strong>Total Problems:</strong> ${response.count}</p>
                            <p><strong>First Problem:</strong> ${response.data[0].title}</p>
                            <details>
                                <summary>View Response</summary>
                                <pre>${JSON.stringify(response, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    throw new Error('API returned success: false');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">
                        <h2>❌ Failed</h2>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>API URL:</strong> ${window.API_BASE_URL}/problems</p>
                        <p><strong>Check:</strong></p>
                        <ul>
                            <li>Backend running on port 5001?</li>
                            <li>CORS enabled in backend?</li>
                            <li>Network tab in browser console</li>
                        </ul>
                    </div>
                `;
            }
        }

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testConnection, 500);
        });
    </script>
</body>
</html>
