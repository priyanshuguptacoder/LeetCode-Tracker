<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Fresh Load - LeetCode Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #00C896;
            text-align: center;
        }
        .box {
            background: #0a0a0a;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00C896;
        }
        button {
            background: #00C896;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        button:hover {
            background: #00a076;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: #0a0a0a;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔄 Fresh Load</h1>
        <p>This page will load your app with NO CACHE</p>
        
        <div class="status" id="status">
            <p>Checking configuration...</p>
        </div>
        
        <button onclick="loadApp()">Load App (No Cache)</button>
        <button onclick="checkConfig()">Test Configuration</button>
    </div>

    <script>
        // Force no cache on all requests
        const timestamp = new Date().getTime();
        
        function checkConfig() {
            const status = document.getElementById('status');
            status.innerHTML = '<p>⏳ Testing...</p>';
            
            // Load api-config.js with no cache
            fetch(`api-config.js?t=${timestamp}`)
                .then(response => response.text())
                .then(text => {
                    if (text.includes('LOCAL_API_URL')) {
                        status.innerHTML = `
                            <p style="color: #00C896;">✅ Configuration file found!</p>
                            <p>API config is available on server</p>
                        `;
                    } else {
                        status.innerHTML = `
                            <p style="color: #ef4444;">❌ Configuration file issue</p>
                        `;
                    }
                })
                .catch(err => {
                    status.innerHTML = `
                        <p style="color: #ef4444;">❌ Error: ${err.message}</p>
                    `;
                });
        }
        
        function loadApp() {
            // Redirect to main app with cache-busting parameter
            window.location.href = `/?nocache=${timestamp}`;
        }
        
        // Auto-check on load
        window.addEventListener('load', checkConfig);
    </script>
</body>
</html>
